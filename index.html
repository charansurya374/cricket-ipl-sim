<!DOCTYPE html>
<html>
<head>
<title>IPL Simulator</title>

<style>
body { background:#0b0f17; color:white; font-family:Arial; text-align:center; }

.container {
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
}

.card {
  background:#111827;
  padding:15px;
  margin:10px;
  border-radius:12px;
  width:320px;
}

button {
  padding:10px;
  margin:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#commentary {
  height:200px;
  overflow-y:auto;
  text-align:left;
}
</style>

</head>

<body>

<h1>🏏 IPL Simulator</h1>

<div class="container">

<div class="card" id="match"></div>

<div class="card">
<h2>Controls</h2>
<button onclick="playBall()">Play Ball</button>
<button onclick="autoPlay()">Auto</button>
<button onclick="simulateInnings()">Sim Inn</button>
<button onclick="simulateMatch()">Sim Match</button>
</div>

<div class="card" id="table"></div>

<div class="card">
<h2>Commentary</h2>
<div id="commentary"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
