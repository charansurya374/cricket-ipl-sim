<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Simulator</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f17;
  color:white;
}

/* HEADER */
h1 {
  text-align:center;
  padding:20px;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap:20px;
  padding:20px;
}

/* CARDS */
.card {
  background:#111827;
  border-radius:12px;
  padding:15px;
  min-height:220px;
}

/* BUTTONS */
button {
  padding:10px 14px;
  margin:5px;
  background:#2563eb;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:#1d4ed8;
}

/* COMMENTARY */
#commentary {
  height:220px;
  overflow-y:auto;
  text-align:left;
  font-size:14px;
}

/* MATCH BOX */
#match h1 {
  margin:10px 0;
}

/* TABLE */
#table p {
  margin:6px 0;
}
</style>

</head>

<body>

<h1>🏏 IPL Simulator</h1>

<div class="container">

  <!-- MATCH -->
  <div class="card" id="match">
    <h2>Match Info</h2>
  </div>

  <!-- CONTROLS -->
  <div class="card">
    <h2>Controls</h2>

    <button onclick="playBall()">Play Ball</button>
    <button onclick="autoPlay()">Auto</button>
    <button onclick="simulateInnings()">Sim Inn</button>
    <button onclick="simulateMatch()">Sim Match</button>
  </div>

  <!-- POINTS TABLE -->
  <div class="card" id="table">
    <h2>Points Table</h2>
  </div>

  <!-- COMMENTARY -->
  <div class="card">
    <h2>Commentary</h2>
    <div id="commentary"></div>
  </div>

</div>

<!-- JS FILE -->
<script src="script.js"></script>

</body>
</html>
