<!DOCTYPE html>
<html>
<head>
  <title>IPL Simulator 2026</title>
  <style>
    body {
      background: #0b1c2c;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      border: 2px solid white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    .commentary {
      height: 200px;
      overflow-y: auto;
      text-align: left;
      border: 1px solid gray;
      padding: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid white;
      padding: 5px;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>IPL Simulator 2026</h1>

<div class="box">
  <h2 id="matchTitle">Match</h2>
  <h3 id="score">0/0 (0.0)</h3>
</div>

<div class="box commentary" id="commentary"></div>

<button onclick="startLeague()">Start League</button>
<button onclick="stopMatch()">Stop</button>

<div class="box">
  <h2>Points Table</h2>
  <table id="pointsTable">
    <tr>
      <th>Team</th><th>P</th><th>W</th><th>L</th><th>Pts</th>
    </tr>
  </table>
</div>

<script>

// ---------------- TEAMS ----------------
const teams = ["MI","CSK","RCB","KKR","SRH","DC","PBKS","RR","GT","LSG"];

// ---------------- POINTS TABLE ----------------
let table = {};

teams.forEach(t => {
  table[t] = {played:0, win:0, loss:0, points:0};
});

// ---------------- MATCHES ----------------
let matches = [];
let matchIndex = 0;

// ---------------- MATCH STATE ----------------
let runs = 0, wickets = 0, balls = 0;
let currentMatch = null;
let interval = null;
let running = false;

// ---------------- GENERATE 70 MATCHES ----------------
function generateMatches() {
  matches = [];

  for (let i=0;i<teams.length;i++) {
    for (let j=i+1;j<teams.length;j++) {
      matches.push([teams[i], teams[j]]);
      matches.push([teams[j], teams[i]]);
    }
  }

  matches = matches.sort(()=>Math.random()-0.5).slice(0,70);
}

// ---------------- START LEAGUE ----------------
function startLeague() {
  generateMatches();
  matchIndex = 0;
  nextMatch();
}

// ---------------- NEXT MATCH ----------------
function nextMatch() {
  if (matchIndex >= matches.length) {
    alert("League Finished");
    return;
  }

  let m = matches[matchIndex];
  currentMatch = m;

  document.getElementById("matchTitle").innerText = m[0] + " vs " + m[1];

  resetMatch();

  running = true;

  interval = setInterval(playBall, 800);
}

// ---------------- STOP ----------------
function stopMatch() {
  clearInterval(interval);
  running = false;
}

// ---------------- RESET ----------------
function resetMatch() {
  runs = 0;
  wickets = 0;
  balls = 0;
  document.getElementById("commentary").innerHTML = "";
}

// ---------------- PLAY BALL ----------------
function playBall() {

  if (!running) return;

  if (balls >= 30 || wickets >= 10) { // short demo match
    finishMatch();
    return;
  }

  balls++;

  let outcome = getOutcome();

  if (outcome === "W") wickets++;
  else runs += outcome;

  updateScore();
  addCommentary(generateCommentary(outcome));
}

// ---------------- OUTCOME ----------------
function getOutcome() {
  const arr = [0,1,1,2,3,4,6,"W"];
  return arr[Math.floor(Math.random()*arr.length)];
}

// ---------------- SCORE ----------------
function updateScore() {
  let overs = Math.floor(balls/6)+"."+(balls%6);
  document.getElementById("score").innerText =
    runs + "/" + wickets + " (" + overs + ")";
}

// ---------------- COMMENTARY ----------------
function addCommentary(text) {
  let div = document.getElementById("commentary");
  div.innerHTML = "<p>"+text+"</p>" + div.innerHTML;
}

function generateCommentary(outcome) {
  const lines = [
    "good length outside off",
    "short ball on middle",
    "full on the pads",
    "slower ball outside off",
    "back of a length"
  ];

  let line = lines[Math.floor(Math.random()*lines.length)];
  let ball = formatBall();

  let result = "";

  if (outcome === "W") result = "OUT caught at deep";
  else if (outcome === 0) result = "no run";
  else if (outcome === 4) result = "FOUR";
  else if (outcome === 6) result = "SIX";
  else result = outcome + " run";

  return ball + " " + line + ", " + result;
}

function formatBall() {
  let over = Math.floor((balls-1)/6);
  let ball = ((balls-1)%6)+1;
  return over+"."+ball;
}

// ---------------- FINISH MATCH ----------------
function finishMatch() {

  clearInterval(interval);

  let team1 = currentMatch[0];
  let team2 = currentMatch[1];

  let score1 = runs;
  let score2 = Math.floor(Math.random()*200);

  let winner;

  if (score1 > score2) winner = team1;
  else winner = team2;

  updatePoints(team1, team2, winner);

  addCommentary("Match Finished: " + winner + " won");

  matchIndex++;

  setTimeout(nextMatch, 2000);
}

// ---------------- POINTS ----------------
function updatePoints(t1, t2, winner) {

  table[t1].played++;
  table[t2].played++;

  if (winner === t1) {
    table[t1].win++; table[t1].points+=2;
    table[t2].loss++;
  } else {
    table[t2].win++; table[t2].points+=2;
    table[t1].loss++;
  }

  renderTable();
}

// ---------------- RENDER TABLE ----------------
function renderTable() {

  let html = `
  <tr>
    <th>Team</th><th>P</th><th>W</th><th>L</th><th>Pts</th>
  </tr>`;

  let sorted = Object.entries(table)
    .sort((a,b)=>b[1].points - a[1].points);

  sorted.forEach(([team,data])=>{
    html += `<tr>
      <td>${team}</td>
      <td>${data.played}</td>
      <td>${data.win}</td>
      <td>${data.loss}</td>
      <td>${data.points}</td>
    </tr>`;
  });

  document.getElementById("pointsTable").innerHTML = html;
}

</script>

</body>
</html>
